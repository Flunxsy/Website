<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flunxsy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
    url('banner.png');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Animated Bengal Stripe Overlay */

body::before{
    content:'';
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        115deg,
        transparent 0px,
        transparent 60px,
        rgba(255,120,0,.15) 60px,
        rgba(255,120,0,.15) 120px
    );
    animation:moveStripes 12s linear infinite;
}

@keyframes moveStripes{
    from{
        transform:translateX(0px);
    }
    to{
        transform:translateX(200px);
    }
}

.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:500px;
    background:rgba(15,15,15,.78);
    border:2px solid rgba(255,120,0,.45);
    backdrop-filter:blur(10px);
    border-radius:28px;
    padding:35px;
    text-align:center;
    box-shadow:
    0 0 25px rgba(255,120,0,.35),
    0 0 80px rgba(255,120,0,.12);
}

/* Profile */

.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    border:5px solid #ff6a00;
    object-fit:cover;
    box-shadow:0 0 30px rgba(255,106,0,.55);
    margin-bottom:18px;
}

h1{
    color:white;
    font-size:2.4rem;
    font-weight:700;
    letter-spacing:2px;
}

.tag{
    color:#ff9d4d;
    margin-top:5px;
    margin-bottom:30px;
    font-size:.95rem;
}

/* Links */

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.link-btn{
    text-decoration:none;
    color:white;
    background:linear-gradient(
        90deg,
        #ff6a00,
        #ff8c00
    );
    padding:16px;
    border-radius:16px;
    font-weight:600;
    transition:.25s ease;
    border:2px solid transparent;
    box-shadow:0 0 20px rgba(255,120,0,.22);
}

.link-btn:hover{
    transform:translateY(-4px) scale(1.02);
    border:2px solid white;
    box-shadow:0 0 35px rgba(255,120,0,.6);
}

/* Footer */

.footer{
    margin-top:28px;
    color:#8f8f8f;
    font-size:.85rem;
}

/* Mobile */

@media(max-width:600px){

    .container{
        padding:28px 22px;
    }

    h1{
        font-size:2rem;
    }

    .avatar{
        width:120px;
        height:120px;
    }

}

</style>
</head>
<body>

<div class="container">

    <!-- PROFILE IMAGE -->
    <img src="Untitled.jpg" class="avatar">

    <h1>FLUNXSY</h1>

    <div class="tag">
        Gamer • Streamer • Creator
    </div>

    <div class="links">

        <a class="link-btn" href="https://x.com/Flunxsy" target="_blank">
            Twitter / X
        </a>

        <a class="link-btn" href="https://tiktok.com/Flunxsy" target="_blank">
            TikTok
        </a>

        <a class="link-btn" href="https://instagram.com/Flunxsy" target="_blank">
            Instagram
        </a>

        <a class="link-btn" href="https://twitch.tv/Flunxsy" target="_blank">
            Twitch
        </a>

        <a class="link-btn" href="https://xbox.com/" target="_blank">
            Xbox
        </a>

        <a class="link-btn" href="https://playstation.com/" target="_blank">
            PlayStation
        </a>

        <a class="link-btn" href="https://youtube.com/@FlunxsyYT" target="_blank">
            YouTube
        </a>

        <a class="link-btn" href="https://discord.com/" target="_blank">
            Discord
        </a>

    </div>

    <div class="footer">
        © Flunxsy
    </div>

</div>

</body>
</html>
