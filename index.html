
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official social hub for Flunxsy. Catch me on YouTube, TikTok, Roblox, and more.">
    <title>Flunxsy | Official Hub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

        body {
            min-height:100vh;
            overflow-x:hidden;
            background:#050505;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
            color: white;
        }

        /* BACKGROUND ELEMENTS */
        .bg { position:fixed; inset:0; background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.85)), url('banner.webp'); background-size:cover; background-position:center; z-index:-3; }
        .stripes { position:fixed; inset:0; z-index:-2; opacity:.25; background:repeating-linear-gradient(115deg, transparent 0px, transparent 90px, #ff6a00 90px, #ff6a00 170px); animation:slide 14s linear infinite; }
        @keyframes slide { from { transform:translateX(0); } to { transform:translateX(260px); } }

        /* CARD */
        .card {
            width:100%;
            max-width:620px;
            background:rgba(10,10,10,.72);
            border:1px solid rgba(255,255,255,.08);
            backdrop-filter:blur(14px);
            border-radius:32px;
            padding:40px;
            box-shadow: 0 0 30px rgba(255,106,0,.15), 0 0 120px rgba(255,106,0,.08);
        }

        /* PROFILE */
        .profile { text-align:center; }
        .avatar {
            width:160px;
            height:160px;
            object-fit:cover;
            border-radius:50%;
            border:5px solid #ff6a00;
            box-shadow: 0 0 30px rgba(255,106,0,.5);
            transition: transform 0.3s ease;
        }
        h1 { font-size:3rem; margin-top:20px; font-weight:800; letter-spacing:2px; cursor: pointer; }
        h1:hover { color: #ff6a00; }
        .tagline { color:#ff9a52; margin-top:8px; font-weight:500; }
        .bio { color:#cfcfcf; margin-top:20px; line-height:1.7; font-size:.95rem; }

        /* STATS */
        .stats { display:flex; justify-content:center; gap:20px; margin-top:30px; flex-wrap:wrap; }
        .stat-box { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:16px 24px; min-width:130px; }
        .stat-number { color:#ff6a00; font-size:1.4rem; font-weight:700; }
        .stat-text { color:#aaa; font-size:.85rem; }

        /* LINKS */
        .links { margin-top:35px; display:flex; flex-direction:column; gap:16px; }
        .link {
            text-decoration:none;
            color:white;
            background:linear-gradient(90deg, rgba(255,106,0,.95), rgba(255,140,0,.95));
            padding:18px 22px;
            border-radius:18px;
            font-weight:600;
            display:flex;
            justify-content:space-between;
            align-items:center;
            transition:.25s ease;
            animation: pulse 4s infinite ease-in-out;
        }
        .link:hover { transform:translateY(-4px) scale(1.02); border:1px solid white; box-shadow: 0 0 35px rgba(255,106,0,.45); }
        @keyframes pulse { 0% { box-shadow: 0 0 10px rgba(255,106,0,.2); } 50% { box-shadow: 0 0 20px rgba(255,106,0,.4); } 100% { box-shadow: 0 0 10px rgba(255,106,0,.2); } }

        .footer { text-align:center; margin-top:30px; color:#888; font-size:.8rem; }

        @media(max-width:700px) {
            .card { padding:28px; }
            h1 { font-size:2rem; }
        }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="stripes"></div>

<div class="card">
    <div class="profile">
        <img src="Untitled.webp" alt="Flunxsy Profile Picture" class="avatar" loading="lazy">
        <h1 id="copyName">FLUNXSY</h1>
        <div class="tagline">Streamer • Gamer • Creator</div>
        <div class="bio">Welcome to my official social hub. Click my name to copy it!</div>
    </div>

    <div class="stats">
        <div class="stat-box"><div class="stat-number">LIVE</div><div class="stat-text">Status</div></div>
        <div class="stat-box"><div class="stat-number">24/7</div><div class="stat-text">Grinding</div></div>
        <div class="stat-box"><div class="stat-number">∞</div><div class="stat-text">Goals</div></div>
    </div>

    <div class="links">
        <a class="link" href="https://x.com/Flunxsy" target="_blank">Twitter / X <span>@Flunxsy</span></a>
        <a class="link" href="https://www.tiktok.com/@flunxsy" target="_blank">TikTok <span>@flunxsy</span></a>
        <a class="link" href="https://youtube.com/@FlunxsyYT" target="_blank">YouTube <span>@FlunxsyYT</span></a>
        <a class="link" href="https://www.roblox.com/users/11199070771/profile" target="_blank">Roblox <span>Flunxsy</span></a>
    </div>

    <div class="footer">© 2026 Flunxsy. All rights reserved.</div>
</div>

<script>
    document.getElementById('copyName').addEventListener('click', function() {
        navigator.clipboard.writeText("Flunxsy");
        const originalText = this.innerText;
        this.innerText = "COPIED!";
        setTimeout(() => this.innerText = originalText, 2000);
    });
</script>

</body>
</html>
